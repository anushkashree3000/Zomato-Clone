<!DOCTYPE html>

<html>

<head>

    <title>Login Page</title>

</head>

<body>



        <h1>Login to Your Account</h1>

        <p>
            Welcome back! Enter your details below.
        </p>

        <form>

            

            <label for="email">
                Email Address
            </label>

            <br>

            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
                required>

            <br><br>

            <!-- Password -->

            <label for="password">
                Password
            </label>

            <br>

            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
                minlength="8">

            <br><br>

            <!-- Remember Me -->

            <input
                type="checkbox"
                id="remember"
                name="remember">

            <label for="remember">
                Remember Me
            </label>

            <br><br>

            <!-- Buttons -->

            <input
                type="submit"
                value="Login">

            <input
                type="reset"
                value="Clear">

        </form>

        <br>

        <p>

            Forgot Password?

            <a href="#">
                Click Here
            </a>

        </p>

        <p>

            Don't have an account?

            <a href="signup.html">
                Sign Up
            </a>

        </p>

    </main>

    <hr>

    <!-- Footer -->

    <footer>

        <p>
            © 2026 Zomato Clone
        </p>

    </footer>

</body>

</html>
